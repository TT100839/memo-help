<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スマホ送信</title>
    <style>
      body { font-family: sans-serif; padding: 20px; }
      textarea { width: 100%; height: 200px; display: block; }
    </style>
  </head>
  <body>
    <h2 id="status">接続待機中...</h2>
    <textarea id="memo-area"></textarea>
    <button id="send-btn" disabled>送信</button>
<script>
  const WORKER_URL = "[https://memo-signaling.tanakasan32400.workers.dev](https://memo-signaling.tanakasan32400.workers.dev)";
  const urlParams = new URLSearchParams(window.location.search);
  const sessionId = urlParams.get("id");

  let dataChannel = null;

  async function init() {
    if (!sessionId) {
      document.getElementById("status").textContent = "URLエラー(IDなし)";
      return;
    }

    const res = await fetch(WORKER_URL + "/offer?id=" + sessionId);
    if (!res.ok) {
      document.getElementById("status").textContent = "期限切れ";
      return;
    }
    const offer = await res.json();

    const pc = new RTCPeerConnection({
      iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
    });

    pc.ondatachannel = (event) => {
      dataChannel = event.channel;
      dataChannel.onopen = () => {
        document.getElementById("status").textContent = "接続完了";
        document.getElementById("status").style.color = "#34a853";
        document.getElementById("send-btn").disabled = false;
      };
    };

    pc.onicecandidate = async (event) => {
      if (event.candidate === null) {
        await fetch(WORKER_URL + "/answer?id=" + sessionId, {
          method: "POST",
          body: JSON.stringify(pc.localDescription)
        });
      }
    };

    await pc.setRemoteDescription(offer);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
  }

  document.getElementById("send-btn").onclick = () => {
    const text = document.getElementById("memo-area").value;
    if (dataChannel && dataChannel.readyState === "open" && text) {
      dataChannel.send(text);
      document.getElementById("memo-area").value = "";
      
      const btn = document.getElementById("send-btn");
      btn.textContent = "送信済";
      btn.style.background = "#34a853";
      
      setTimeout(() => { 
        btn.textContent = "送信"; 
        btn.style.background = "var(--accent-blue)";
      }, 1500);
    }
  };

  init();
</script>
</body>
</html>
